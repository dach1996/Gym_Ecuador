name: Deploy a IIS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  PUBLISH_CONFIGURATION: Staging
  PUBLISH_PROJECT: GatewayCoreAPI/GatewayCoreAPI.csproj
  # CORRECCIÓN 1: Usar la sintaxis de ruta de Windows con barras normales
  REMOTE_SITE_PATH: "C:/inetpub/wwwroot/MobileApi"
  IIS_APP_POOL_NAME: FitcenterMobileApi

jobs:
  deploy-mobile-api:
    name: Mobile API (GatewayCoreAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Gym_Ecuador.sln

      - name: Publish
        run: dotnet publish ${{ env.PUBLISH_PROJECT }} -c ${{ env.PUBLISH_CONFIGURATION }} -o ./publish

      - name: Copiar archivos a la VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          # CORRECCIÓN 2: Es más seguro enviar la carpeta completa y usar strip_components
          source: "publish"
          target: ${{ env.REMOTE_SITE_PATH }}
          strip_components: 1
          rm: false
          tar_dereference: true

      - name: Reiniciar App Pool
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          script_stop: true
          request_pty: true
          script: |
            powershell -Command "
              Import-Module WebAdministration;
              $pool = '${{ env.IIS_APP_POOL_NAME }}';
              if (Get-WebAppPoolState -Name $pool -ErrorAction SilentlyContinue) {
                Restart-WebAppPool -Name $pool;
                Write-Host 'App Pool reiniciado.';
              } else {
                iisreset /restart;
              }
            "